    <!-- Meta Pixel — TBT-friendly two-stage init.
         1. Set up `window.fbq` immediately as a queueing stub so PixelService
            can call fbq('track', ...) the moment it boots — calls land in the
            queue and replay once the library loads.
         2. Defer the 101 KB fbevents.js fetch + `fbq('init', ...)` to idle
            time so it stops competing with hydration / LCP. The initial
            PageView is fired by PixelService on first NavigationEnd, so
            timing doesn't depend on the library being loaded synchronously. -->
    <script>
      // Write _fbc NOW — synchronously, before iOS Safari 17+ Link Tracking
      // Protection or Angular's router can strip fbclid from the URL, and before
      // the first PageView fires. By the time fbevents.js loads (idle callback +
      // network) the parameter is gone on iOS, so we persist it ourselves here.
      // Don't clobber an existing _fbc. Format: fb.1.<creationTime>.<fbclid>.
      (function () {
        try {
          var m = location.search.match(/[?&]fbclid=([^&]+)/);
          if (m && document.cookie.indexOf("_fbc=") === -1) {
            var fbc = "fb.1." + Date.now() + "." + decodeURIComponent(m[1]);
            var exp = new Date(Date.now() + 90 * 24 * 60 * 60 * 1000).toUTCString();
            document.cookie = "_fbc=" + fbc + "; path=/; expires=" + exp + "; SameSite=Lax";
          }
        } catch (e) {}
      })();

      (function (f) {
        if (f.fbq) return;
        var n = (f.fbq = function () {
          n.callMethod
            ? n.callMethod.apply(n, arguments)
            : n.queue.push(arguments);
        });
        if (!f._fbq) f._fbq = n;
        n.push = n;
        n.loaded = !0;
        n.version = "2.0";
        n.queue = [];
      })(window);
      function __loadFbPixel() {
        if (document.getElementById("fb-pixel-lib")) return;
        var t = document.createElement("script");
        t.id = "fb-pixel-lib";
        t.async = true;
        t.src = "https://connect.facebook.net/en_US/fbevents.js";
        t.onload = function () {
          // Init only. PixelService is the single source of PageView (fired on
          // every NavigationEnd, incl. the first); its call queues in the fbq
          // stub and replays here with a shared eventID once the library loads,
          // so browser + CAPI dedupe. Firing PageView here too would double-count
          // the landing view (the queued one + this one carry different IDs).
          window.fbq("init", "780880514467909");
        };
        document.head.appendChild(t);
      }
      if ("requestIdleCallback" in window) {
        requestIdleCallback(__loadFbPixel, { timeout: 3000 });
      } else {
        setTimeout(__loadFbPixel, 2000);
      }
    </script>

    <!-- Fonts loaded non-render-blocking: preload the stylesheet without
         blocking first paint, then promote to a real stylesheet once the
         CSS is parsed (`onload` swap). Noscript fallback covers clients
         without JS. `display=swap` on both URLs means the browser paints
         with the system fallback immediately and swaps in Roboto / icons
         when they arrive — no FOIT delay on the LCP poster. -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap"
      />
    </noscript>
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/icon?family=Material+Icons&display=swap"
